<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mascotas - Vets & Co.</title>

<style>

* {
    box-sizing: border-box;
}

body {
    background-color: #9EC7D9;
    margin: 0px;
    margin-top: 120px;
    font-family: Verdana, Century Gothic;
}

header {
    background-color: #FDFF85;
    padding: 30px;

    text-align: center;
    font-size: 50px;
    font-weight: bold;
    font-family: Century Gothic;
    color: #FFC34F;

    clip-path: ellipse(70% 100% at 50% 0%);
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 120px;
    z-index: 1000;
}

header img {
    position: absolute;
    top: 40%;
    left: 20px;
    transform: translateY(-50%);
    width: 90px;
}

nav { 
    background-color: #86C2D9; 
    padding-top: 50px; 
    padding-bottom: 20px;
    text-align: center;  
    position: fixed; 
    top: 83px; 
    clip-path: ellipse(65% 100% at 50% 0%);
    width: 100%;  
    z-index: 999; 

}

nav a {
    color: #FFFFFF;
    text-decoration: none;
    margin: 0 30px;
    font-size: 18px;
    font-family: Century Gothic;
    font-weight: bold;
}

.adecoracion {
    background-color: #FFFFFF;
    padding: 315px;
    margin-top: 200px;
    clip-path: ellipse(70% 100% at 50% 100%);
}

.bdecoracion {
    background-color: #FFFFFF;
    padding: 315px;
    margin-top: 0px;
    clip-path: ellipse(70% 100% at 50% 0%);
}

h2 {
    color: #2F4B52;
    font-size: 25px;
    font-family: Century Gothic;
    font-weight: bold;
    position: absolute;
    top: 250px;
    left: 50%;
    transform: translateX(-50%);
}

.form-container {
    background: #9EC7D9;
    max-width: 600px;
    width: 95%;
    padding: 50px;
    border-radius: 12px;
    position: absolute;
    top: 350px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99;
}

.form-group {
    margin-bottom: 22px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #2F4B52;
    font-size: 17px;
    font-family: Century Gothic;
}

input[type="text"], input[type="number"], input[type="date"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #E0D0DD;
    border-radius: 6px;
    font-family: Century Gothic;
    font-size: 18px;
    background-color: #FAF7FA;
    color: #333;
    transition: all 0.3s ease;
}

select {
    width: 100%;
    padding: 12px;
    border: 1px solid #E0D0DD;
    border-radius: 6px;
    font-family: Century Gothic;
    font-size: 18px;
    background-color: #FAF7FA;
    color: #333;
    transition: all 0.3s ease;
}

.boton {
    background-color: #639099;
    color: #FFFFFF;
    border: none;
    padding: 14px 15px;
    width: 100%;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    font-family: Century Gothic;
    margin-top: 10px;
}

</style>
</head>

<body>

    <header>
      <img src="Logo_VyC.png" alt="logo">
      <span>Vets & Co.</span>
    </header>

    <nav>
      <a href="file:///D:/4to%20Semestre/Meza/Vets%20y%20Co/Formularios/index.html">Inicio</a>
      <a href="file:///D:/4to%20Semestre/Meza/Vets%20y%20Co/Formularios/f.mascotas.html">Mascotas</a>
      <a href="file:///D:/4to%20Semestre/Meza/Vets%20y%20Co/Formularios/f.due%C3%B1os.html">Dueños</a>
      <a href="file:///D:/4to%20Semestre/Meza/Vets%20y%20Co/Formularios/f.historial.html">Historial Médico</a>
      <a href="file:///D:/4to%20Semestre/Meza/Vets%20y%20Co/Formularios/f.empleados.html">Empleados</a>
      <a href="file:///D:/4to%20Semestre/Meza/Vets%20y%20Co/Formularios/f.inventario.html">Inventario</a>
    </nav>

  <main>

    <section class="adecoracion">
      <h2>Registrar Mascotas</h2>
    </section>

    <section class="bdecoracion">
    </section> 
    <div class="form-container">
      <form action="altas.html" method="POST">

        <div class=form-group>
          <label>ID Mascota</label>
          <input type="number" name="id mascota" placeholder="Ej: 001" required>
        </div>

        <div class=form-group>
          <label>Nombre de la Mascota</label>
          <input type="text" name="nombre mascota" placeholder="Ej: Molly" required>
        </div>

        <div class=form-group>
          <label>Nombre del Dueño</label>
          <input type="text" name="nombre dueño" placeholder="Ej: Irais Silva" required>
        </div>

        <div class=form-group>
          <label>Número de Microchip</label>
          <input type="number" name="microchip" placeholder="Escribir '-' si no hay registro" required>
        </div>

        <div class=form-group>
          <label>Especie</label>
          <input type="text" name="especie" placeholder="Ej: Gato" required>
        </div>

        <div class=form-group>
          <label>Raza</label>
          <input type="text" name="raza" placeholder="Escribir 'SRD' si no hay registro" required>
        </div>

        <div class=form-group>
          <label>Edad</label>
          <input type="number" name="edad" placeholder="Escribir años o meses" required>
        </div>

        <div class=form-group>
          <label>Peso</label>
          <input type="text" name="peso" placeholder="Escribir unidades" required>
        </div>

        <div class=form-group>
          <label>Sexo</label>
            <select name="sexo" required>
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Macho">Macho</option>
            <option value="Hembra">Hembra</option>
            </select>
        </div>

        <button type="submit" class="boton">Registrar</button>

      </form>
    </div>

  </main>

</body>
</html>
